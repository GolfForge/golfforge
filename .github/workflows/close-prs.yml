name: Close external PRs

# GolfForge isn't accepting external pull requests yet (CLA + governance pending; see
# CONTRIBUTING.md). This politely closes PRs from non-maintainers. Remove this workflow
# once a CLA is in place and PRs are reopened.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            // Let maintainers / org members open PRs; only auto-close outside contributors.
            if (["OWNER", "MEMBER", "COLLABORATOR"].includes(pr.author_association)) {
              return;
            }
            const body = [
              "Thanks for the contribution! GolfForge isn't accepting external pull requests yet — ",
              "we need a Contributor License Agreement (CLA) in place first so the project can keep ",
              "its AGPL-3.0 + commercial dual-license (see CONTRIBUTING.md). ",
              "Closing this PR automatically for now. Bug reports and feature requests via Issues are very welcome."
            ].join("");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed",
            });
