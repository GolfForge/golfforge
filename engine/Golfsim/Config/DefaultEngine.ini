; GOL-125: bump VSM physical-page pool from the 4096 default. The course's PCG-scattered tree
; canopy + landscape over 2 km^2 overflowed the default budget ("page pool overflow detected"
; logs). 8192 is comfortable headroom; doubles GPU VRAM cost for the shadow page atlas (~50 MB
; vs ~25 MB) -- acceptable for a desktop GPU and worth it for clean shadows on the course.
r.Shadow.Virtual.MaxPhysicalPages=8192

