; Launch-monitor framework (GOL-11). ActiveDriver picks which connector the manager uses;
; bAutoConnect connects it on startup. Disabled by default (no device assumed).
[LaunchMonitor]
ActiveDriver=openflight
bAutoConnect=False

; OpenFlight driver endpoint (separate AGPL process on the user's Pi or localhost via its --mock
; mode). Host + Port are kept separate because a "ws://..." value gets truncated at "//" by the INI
; parser; the driver assembles ws://Host:Port in code. See Drivers/README.md.
[OpenFlight]
Host=localhost
Port=8080
