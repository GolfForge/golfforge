; GOL-124 cook configuration. Both maps are always cooked. The per-course PNG/JSON tree under
; <repo>/courses/ is copied into the staged build by a post-cook step (UAT's
; DirectoriesToAlwaysStageAsNonUFS rejects paths that escape the project root, so the courses
; dir -- which lives outside engine/Golfsim/ -- can't be staged via the ini mechanism). Add a new
; course by appending another +MapsToCook entry; copying the directory is part of the package
; script (engine/scripts/package.sh from GOL-49, when it lands).
[/Script/UnrealEd.ProjectPackagingSettings]
+MapsToCook=(FilePath="/Game/Maps/PracticeRange")
+MapsToCook=(FilePath="/Game/Maps/GolfForgeDemoBlack")
+MapsToCook=(FilePath="/Game/Maps/GolfForgeDemoBlue")
+MapsToCook=(FilePath="/Game/Maps/GolfForgeDemoRed")
+MapsToCook=(FilePath="/Game/Maps/GolfForgeDemoGreen")
+MapsToCook=(FilePath="/Game/Maps/GolfForgeDemoYellow")
; GOL-148: the GolfUITheme loads fonts + gradient materials via LoadObject("/Game/UI/...") path
; strings, which the cooker can't see statically -- without this they'd be missing from a packaged
; build (engine-default font fallback + flat-colour gradients). Always-cook the UI content tree so
; the new Barlow / JetBrains faces + M_UIGradient* stage. (Verified at cook time in GOL-49 / v0.0.4-alpha.)
+DirectoriesToAlwaysCook=(Path="/Game/UI")

; Launch-monitor framework (GOL-11). ActiveDriver picks which connector the manager uses;
; bAutoConnect connects it on startup. Disabled by default (no device assumed).
[LaunchMonitor]
ActiveDriver=openflight
bAutoConnect=False

; OpenFlight driver endpoint (separate AGPL process on the user's Pi or localhost via its --mock
; mode). Host + Port are kept separate because a "ws://..." value gets truncated at "//" by the INI
; parser; the driver assembles ws://Host:Port/socket.io/... in code. NOTE: "localhost" is auto-mapped
; to 127.0.0.1 in code -- Windows resolves localhost to IPv6 ::1 first, but the dev server is IPv4-only
; (binds 0.0.0.0), so the ::1 attempt fails (this was GOL-36). See Drivers/README.md.
[OpenFlight]
Host=localhost
Port=8080

; GSPro Open Connect server driver (GOL-178). We play GSPro's role: a raw TCP listener on
; 127.0.0.1:Port speaks GSPro Open Connect V1 (newline-delimited JSON, no auth), so the community
; LM connectors (MLM2PRO, Mevo+, SkyTrak, Garmin R10, Square Omni, Foresight GC2) work against
; GolfForge with no GSPro subscription. Opt-in: select with `golfsim.LMSelect gsproconnect` (then it
; binds the listener). Port 921 (0921) is the GSPro Open Connect convention; connectors default to it.
[LaunchMonitor.GSProConnect]
Port=921
